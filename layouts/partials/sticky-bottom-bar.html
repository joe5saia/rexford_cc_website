{{/* Sticky bottom bar: appears after the hero (or page-band) scrolls out of
     view. Hidden on the thank-you page where the user has already converted. */}}
{{ if ne .RelPermalink "/thank-you/" }}
  <div class="sticky-bar" aria-label="Quick contact" aria-hidden="true" inert>
    <div class="container sticky-bar-inner">
      <span class="sticky-bar-text">Ready to talk financing?</span>
      <div class="sticky-bar-actions">
        <a href="tel:{{ site.Params.phoneRaw }}" class="sticky-bar-phone">{{ partial "icon.html" "phone" }} {{ site.Params.phone }}</a>
        <a href="/get-started/" class="btn btn-primary sticky-bar-btn">Get Started</a>
      </div>
    </div>
  </div>
{{ end }}
