{{ $testimonials := site.Data.testimonials }}
{{ if gt (len $testimonials) 0 }}
  <section class="section alt testimonials">
    <div class="container">
      <h2 class="section-title">What Clients Say</h2>
      <p class="section-lead">Feedback from small business owners we've helped access the financing they deserve.</p>
      <div class="testimonials-grid">
        {{ range $testimonials }}
          <article class="testimonial-card">
            <p class="testimonial-quote">"{{ .quote }}"</p>
            <p class="testimonial-meta">{{ .name }}{{ with .business }} · {{ . }}{{ end }}</p>
          </article>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
