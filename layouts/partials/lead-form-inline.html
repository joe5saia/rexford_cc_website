{{ $source := "Homepage Hero Form" }}
{{ with .source }}
  {{ $source = . }}
{{ end }}
{{ $selectedLoanType := "" }}
{{ with .loanType }}
  {{ $selectedLoanType = . }}
{{ end }}
<form action="{{ site.Params.formEndpoint }}" method="POST" class="lead-form js-inquiry-form">
  <input type="hidden" name="source" value="{{ $source }}" />
  <div class="inquiry-honeypot">
    <label>Website<input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" /></label>
  </div>
  <p class="form-required-note"><abbr title="Required field">*</abbr> indicates a required field</p>
  <label>Loan Type*
    <select name="loanType" required>
      <option value="" disabled{{ if eq $selectedLoanType "" }} selected{{ end }}>Select loan type</option>
      <option{{ if eq $selectedLoanType "Commercial Real Estate" }} selected{{ end }}>Commercial Real Estate</option>
      <option{{ if eq $selectedLoanType "Fix & Flip" }} selected{{ end }}>Fix & Flip</option>
      <option{{ if eq $selectedLoanType "Rental Property Loan" }} selected{{ end }}>Rental Property Loan</option>
      <option{{ if eq $selectedLoanType "Bridge Loan" }} selected{{ end }}>Bridge Loan</option>
      <option{{ if eq $selectedLoanType "Equipment Financing" }} selected{{ end }}>Equipment Financing</option>
      <option{{ if eq $selectedLoanType "Business Line of Credit" }} selected{{ end }}>Business Line of Credit</option>
      <option{{ if eq $selectedLoanType "Small Business Loan" }} selected{{ end }}>Small Business Loan</option>
      <option{{ if eq $selectedLoanType "Other" }} selected{{ end }}>Other</option>
    </select>
  </label>
  <label>Loan Amount*
    <select name="loanAmount" required>
      <option value="" selected disabled>Select range</option>
      <option>Under $100K</option>
      <option>$100K-$250K</option>
      <option>$250K-$500K</option>
      <option>$500K-$1M</option>
      <option>$1M-$5M</option>
      <option>Over $5M</option>
    </select>
  </label>
  <div class="form-row">
    <label>First Name*<input type="text" name="firstName" autocomplete="given-name" required /></label>
    <label>Last Name*<input type="text" name="lastName" autocomplete="family-name" required /></label>
  </div>
  <div class="form-row">
    <label>Phone*<input type="tel" name="phone" autocomplete="tel" required /></label>
    <label>Email*<input type="email" name="email" autocomplete="email" required /></label>
  </div>
  <button type="submit" class="btn btn-primary btn-full">Get My Free Consultation</button>
  <p class="form-status" role="status" aria-live="polite"></p>
  <p class="form-note">Or call us directly: <a href="tel:{{ site.Params.phoneRaw }}">{{ site.Params.phone }}</a></p>
  <p class="form-privacy">We never sell or share your information.</p>
</form>
