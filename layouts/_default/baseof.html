<!doctype html>
<html lang="en">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    {{ if not .IsHome }}
      {{ partial "header.html" . }}
    {{ end }}

    <main id="main-content">
      {{ block "main" . }}{{ end }}
    </main>

    {{ if not .IsHome }}
      {{ partial "cta-band.html" . }}
      {{ partial "footer.html" . }}
    {{ end }}

    <script src="/js/main.js" defer></script>
    {{ partial "schema.html" . }}
  </body>
</html>
